<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Amanda Low</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:wght@700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <a href="index.html" class="header__logo">Amanda Low</a>
    <nav class="nav">
      <a href="index.html" class="nav__link">Work</a>
      <a href="about.html" class="nav__link">About</a>
      <a href="contact.html" class="nav__link nav__link--active">Contact</a>
    </nav>
  </header>

  <main>
    <section class="contact-hero">
      <div class="contact-hero__info">
        <h1 class="contact-hero__title">Contact</h1>
        <div class="contact-hero__details">
          <p>Melbourne, Australia</p>
          <p><a href="mailto:hello@amandalow.com">hello@amandalow.com</a></p>
        </div>
      </div>

      <form id="contact-form" class="contact-hero__form">
        <div class="form-group">
          <label class="form-label">Name</label>
          <div class="form-row">
            <div class="form-field">
              <label for="first-name" class="form-sublabel">First Name <span class="form-required">(required)</span></label>
              <input type="text" id="first-name" name="first-name" class="form-input" required>
            </div>
            <div class="form-field">
              <label for="last-name" class="form-sublabel">Last Name <span class="form-required">(required)</span></label>
              <input type="text" id="last-name" name="last-name" class="form-input" required>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email <span class="form-required">(required)</span></label>
          <input type="email" id="email" name="email" class="form-input" required>
        </div>

        <div class="form-group">
          <label for="message" class="form-label">Message <span class="form-required">(required)</span></label>
          <textarea id="message" name="message" class="form-textarea" required></textarea>
        </div>

        <button type="submit" class="btn btn--primary">Send</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__copy">&copy; 2026 Amanda Low</p>
      <div class="social-links">
        <a href="https://linkedin.com/in/" class="social-link" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://twitter.com/" class="social-link" target="_blank" rel="noopener">Twitter</a>
        <a href="https://dribbble.com/" class="social-link" target="_blank" rel="noopener">Dribbble</a>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
